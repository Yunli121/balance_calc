<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸 餘額計算 🧸</title>
    <!-- 引入日系圓體字 -->
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff9f5;
            --main-pink: #ffdae0;
            --main-blue: #dcf2f9;
            --main-yellow: #fff4d1;
            --text-color: #6d5b5b;
            --border-style: 2px solid #e0d0c1;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Zen Maru Gothic', 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            border-radius: 30px; /* 超圓潤邊角 */
            box-shadow: 0 10px 25px rgba(224, 208, 193, 0.4);
            padding: 25px;
            position: relative;
            overflow: hidden;
        }

        /* 裝飾性的小圓點，增加和風感 */
        .container::before {
            content: "● ● ●";
            position: absolute;
            top: 15px;
            left: 25px;
            color: var(--main-pink);
            font-size: 10px;
            letter-spacing: 5px;
        }

        h2 {
            text-align: center;
            font-size: 22px;
            color: #a67c7c;
            margin-bottom: 25px;
            background: linear-gradient(transparent 60%, var(--main-blue) 0%);
            display: inline-block;
            width: 100%;
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 15px; }
        
        input {
            width: 100%;
            padding: 12px 15px;
            box-sizing: border-box;
            border: var(--border-style);
            border-radius: 15px;
            font-size: 15px;
            outline: none;
            background-color: #fff;
            color: var(--text-color);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--main-pink);
            border: none;
            border-radius: 50px;
            color: #a65d6a;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 10px 0;
            box-shadow: 0 4px 0px #f2b6c1;
        }

        button:active { transform: translateY(3px); box-shadow: 0 1px 0px #f2b6c1; }

        .divider-dashed {
            border: none;
            border-top: 2px dashed #e0d0c1;
            margin: 20px 0;
            height: 0;
        }

        .balance-result {
            background: var(--main-yellow);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-top: 10px;
        }

        #remainingBalance { font-size: 30px; font-weight: 700; color: #8c7356; }

        .history-section { margin-top: 30px; }
        h3 { font-size: 16px; border-left: 5px solid var(--main-blue); padding-left: 10px; margin-bottom: 15px; }

        .history-item {
            display: flex;
            justify-content: space-between;
            background: #fafafa;
            border-bottom: 1px solid #eee;
            padding: 12px 8px;
            font-size: 14px;
        }

        .btn-clear {
            background: none;
            border: 1px solid #e0d0c1;
            color: #ccc;
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 10px;
            box-shadow: none;
            width: auto;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧸 餘額計算 🧸</h2>
    
    <div class="input-group">
        <label>✿ 初始總額</label>
        <input type="number" id="totalAmount" placeholder="請輸入金額..." oninput="saveData()">
    </div>

    <div class="input-group">
        <label>✿ 扣款日期</label>
        <input type="date" id="expDate">
    </div>

    <div class="input-group">
        <label>✿ 扣款金額</label>
        <input type="number" id="expAmount" placeholder="今天花多少？">
    </div>

    <button onclick="calculate()">確認新增 ✨</button>

    <div class="divider-dashed"></div>

    <div class="balance-result">
        <div style="font-size: 14px; opacity: 0.8;">目前餘額</div>
        <div id="remainingBalance">$ 0</div>
    </div>

    <div class="history-section">
        <h3>歷史小筆記</h3>
        <div id="historyList"></div>
    </div>

    <!-- 清除所有資料的按鈕，以備不時之需 -->
    <center><button class="btn-clear" onclick="clearAll()">清除所有資料</button></center>
</div>

<script>
    let records = [];
    let totalBudget = 0;

    // 頁面載入時，讀取舊資料
    window.onload = function() {
        const savedRecords = localStorage.getItem('my_records');
        const savedTotal = localStorage.getItem('my_total');

        if (savedRecords) {
            records = JSON.parse(savedRecords);
            renderHistory();
        }
        if (savedTotal) {
            totalBudget = parseFloat(savedTotal);
            document.getElementById('totalAmount').value = totalBudget;
        }
        
        updateBalanceDisplay();
        document.getElementById('expDate').valueAsDate = new Date();
    };

    function calculate() {
        const totalInput = parseFloat(document.getElementById('totalAmount').value);
        const amount = parseFloat(document.getElementById('expAmount').value);
        const date = document.getElementById('expDate').value;

        if (isNaN(totalInput)) {
            alert("請先填寫總金額喔！(๑•́ ₃ •̀๑)");
            return;
        }
        if (isNaN(amount) || !date) {
            alert("日期或金額也要填寫唷！");
            return;
        }

        // 更新數據
        totalBudget = totalInput;
        records.push({ date, amount });

        // 存檔到瀏覽器
        saveData();

        // 介面更新
        updateBalanceDisplay();
        renderHistory();
        document.getElementById('expAmount').value = "";
    }

    function saveData() {
        const totalInput = document.getElementById('totalAmount').value;
        localStorage.setItem('my_records', JSON.stringify(records));
        localStorage.setItem('my_total', totalInput);
        updateBalanceDisplay();
    }

    function updateBalanceDisplay() {
        const totalInput = parseFloat(document.getElementById('totalAmount').value) || 0;
        const totalSpent = records.reduce((sum, record) => sum + record.amount, 0);
        const remaining = totalInput - totalSpent;
        document.getElementById('remainingBalance').innerText = `$ ${remaining.toLocaleString()}`;
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = "";
        const displayRecords = [...records].reverse();
        displayRecords.forEach((record) => {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span>📅 ${record.date}</span> <span style="font-weight:bold; color:#d68a8a;">- $${record.amount.toLocaleString()}</span>`;
            list.appendChild(item);
        });
    }

    function clearAll() {
        if (confirm("確定要刪除所有紀錄嗎？(｡ŏ﹏ŏ)")) {
            localStorage.clear();
            records = [];
            totalBudget = 0;
            document.getElementById('totalAmount').value = "";
            document.getElementById('remainingBalance').innerText = "$ 0";
            renderHistory();
        }
    }
</script>

</body>
</html>
