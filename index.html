<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸 餘額計算 🧸</title>
    <!-- 引入日系圓體字 -->
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
     :root {
            --bg-color: #fff9f5;      /* 溫潤的米白背景 */
            --main-pink: #ffdae0;     /* 櫻花粉 */
            --main-blue: #dcf2f9;     /* 汽水藍 */
            --main-yellow: #fff4d1;   /* 奶油黃 */
            --text-color: #6d5b5b;    /* 暖咖啡色文字，比純黑柔和 */
            --border-style: 2px solid #e0d0c1;
           }

        /* 修正所有元件的尺寸計算方式 */
        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            font-family: 'Zen Maru Gothic', 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 30px;/* 超圓潤邊角 */
            box-shadow: 0 10px 30px rgba(224, 208, 193, 0.3);
            padding: 30px;
        }
        /* 裝飾性的小圓點，增加和風感 */
        .container::before {
            content: "● ● ●";
            position: absolute;
            top: 15px;
            left: 25px;
            color: var(--main-pink);
            font-size: 10px;
            letter-spacing: 5px;
        }

        h2 {
            text-align: center;
            font-size: 24px;
            color: #8c7373;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .input-group { margin-bottom: 25px; width: 100%; }
        
        label { 
            display: flex; 
            align-items: center; 
            font-weight: 700; 
            margin-bottom: 10px; 
            font-size: 16px; 
        }

        label::before {
            content: "✿";
            margin-right: 8px;
            font-size: 14px;
        }
        
        /* 統一所有輸入框樣式，特別針對日期修正 */
        input {
            width: 100%;
            height: 55px; /* 稍微加高，跟截圖比例更接近 */
            padding: 0 20px;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            font-size: 16px;
            outline: none;
            background-color: #fff;
            color: var(--text-color);
            font-family: inherit;
            display: block;
            appearance: none; /* 取消行動裝置預設樣式 */
            -webkit-appearance: none;
        }

        /* 專門修正日期欄位的文字垂直置中 */
        input[type="date"] {
            line-height: 51px; /* 扣除上下邊框的高度 */
        }

        input::placeholder { color: #ccc; }
        input:focus { border-color: var(--main-pink); }

        /* 按鈕文字完全置中 */
        button.add-btn {
            width: 100%;
            height: 65px;
            background-color: var(--main-pink);
            border: none;
            border-radius: 50px;
            color: #8c4a4a;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center; /* 水平置中 */
            gap: 5px;
            transition: all 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 0px #eec0c4;
        }

        button.add-btn:active { transform: translateY(3px); box-shadow: 0 1px 0px #eec0c4; }

        .divider-dashed {
            border: none;
            border-top: 3px dashed #eee;
            margin: 30px 0;
        }

        .balance-result {
            background: var(--main-yellow);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
        }

        #remainingBalance { font-size: 32px; font-weight: 700; color: #8c7356; }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 10px;
            border-bottom: 1px solid #f5f5f5;
        }

        .btn-clear {
            background: none;
            border: 1px solid #ddd;
            color: #bbb;
            font-size: 12px;
            padding: 5px 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧸 餘額計算 🧸</h2>
    
    <div class="input-group">
        <label>✿ 初始總額</label>
        <input type="number" id="totalAmount" placeholder="請輸入金額..." oninput="saveData()">
    </div>

    <div class="input-group">
        <label>✿ 扣款日期</label>
        <input type="date" id="expDate">
    </div>

    <div class="input-group">
        <label>✿ 扣款金額</label>
        <input type="number" id="expAmount" placeholder="今天花多少？">
    </div>

    <button class="add-btn" onclick="calculate()">確認新增 ✨</button>

    <div class="divider-dashed"></div>

    <div class="balance-result">
        <div style="font-size: 14px; margin-bottom:5px;">目前餘額</div>
        <div id="remainingBalance">$ 0</div>
    </div>

    <div style="margin-top: 30px;">
        <h3 style="font-size: 16px;">歷史小筆記</h3>
        <div id="historyList"></div>
    </div>

    <center><button class="btn-clear" onclick="clearAll()">清除所有資料</button></center>
</div>

<script>
    let records = [];

    window.onload = function() {
        const savedRecords = localStorage.getItem('my_records');
        const savedTotal = localStorage.getItem('my_total');
        if (savedRecords) { records = JSON.parse(savedRecords); renderHistory(); }
        if (savedTotal) { document.getElementById('totalAmount').value = savedTotal; }
        updateBalanceDisplay();
        document.getElementById('expDate').valueAsDate = new Date();
    };

    function calculate() {
        const totalInput = parseFloat(document.getElementById('totalAmount').value);
        const amount = parseFloat(document.getElementById('expAmount').value);
        const date = document.getElementById('expDate').value;
        if (isNaN(totalInput)) { alert("請先填寫總金額喔！(๑•́ ₃ •̀๑)"); return; }
        if (isNaN(amount) || !date) { alert("日期或金額也要填寫唷！"); return; }
        records.push({ date, amount });
        saveData();
        updateBalanceDisplay();
        renderHistory();
        document.getElementById('expAmount').value = "";
    }

    function saveData() {
        const totalVal = document.getElementById('totalAmount').value;
        localStorage.setItem('my_records', JSON.stringify(records));
        localStorage.setItem('my_total', totalVal);
        updateBalanceDisplay();
    }

    function updateBalanceDisplay() {
        const totalVal = parseFloat(document.getElementById('totalAmount').value) || 0;
        const totalSpent = records.reduce((sum, record) => sum + record.amount, 0);
        const remaining = totalVal - totalSpent;
        document.getElementById('remainingBalance').innerText = `$ ${remaining.toLocaleString()}`;
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = "";
        [...records].reverse().forEach((record) => {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span>📅 ${record.date}</span> <span style="font-weight:bold; color:#d68a8a;">- $${record.amount.toLocaleString()}</span>`;
            list.appendChild(item);
        });
    }

    function clearAll() {
        if (confirm("確定要刪除所有紀錄嗎？(｡ŏ﹏ŏ)")) {
            localStorage.clear();
            records = [];
            document.getElementById('totalAmount').value = "";
            document.getElementById('remainingBalance').innerText = "$ 0";
            renderHistory();
        }
    }
</script>

</body>
</html>
