<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸 餘額計算 🧸</title>
    <!-- 引入日系圓體字 -->
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff9f5;      /* 溫潤的米白背景 */
            --main-pink: #ffdae0;     /* 櫻花粉 */
            --main-blue: #dcf2f9;     /* 汽水藍 */
            --main-yellow: #fff4d1;   /* 奶油黃 */
            --text-color: #6d5b5b;    /* 暖咖啡色文字 */
            --border-style: 2px solid #e0d0c1;
        }

        /* 確保所有尺寸計算包含邊框 */
        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Zen Maru Gothic', 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(224, 208, 193, 0.4);
            padding: 25px;
            position: relative;
        }

        .container::before {
            content: "● ● ●";
            position: absolute;
            top: 15px;
            left: 25px;
            color: var(--main-pink);
            font-size: 10px;
            letter-spacing: 5px;
        }

        h2 {
            text-align: center;
            font-size: 22px;
            color: #a67c7c;
            margin-bottom: 25px;
            background: linear-gradient(transparent 60%, var(--main-blue) 0%);
            display: inline-block;
            width: 100%;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 15px;
            padding-left: 5px;
        }

        input {
            width: 100%;
            height: 48px;
            padding: 0 15px;
            border: var(--border-style);
            border-radius: 15px;
            font-size: 15px;
            outline: none;
            background-color: #fff;
            color: var(--text-color);
            transition: border 0.3s;
            font-family: inherit;
            display: block;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="date"] {
            line-height: 44px;
        }

        input:focus {
            border-color: #ffdae0;
        }

        button {
            width: 100%;
            height: 52px;
            background-color: var(--main-pink);
            border: none;
            border-radius: 50px;
            color: #a65d6a;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 10px 0;
            box-shadow: 0 4px 0px #f2b6c1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0px #f2b6c1;
        }

        .divider-dashed {
            border: none;
            border-top: 2px dashed #e0d0c1;
            margin: 25px 0;
            height: 0;
        }

        .balance-result {
            background: var(--main-yellow);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-top: 10px;
        }

        .balance-label {
            font-size: 14px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        #remainingBalance {
            font-size: 30px;
            font-weight: 700;
            color: #8c7356;
        }

        .history-section {
            margin-top: 30px;
        }

        h3 {
            font-size: 16px;
            border-left: 5px solid var(--main-blue);
            padding-left: 10px;
            margin-bottom: 15px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
            border-bottom: 1px solid #eee;
            padding: 12px 8px;
            font-size: 14px;
        }

        .history-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-date {
            color: #999;
            font-size: 12px;
        }

        .history-amount {
            color: #d68a8a;
            font-weight: 700;
        }

        .history-actions {
            display: flex;
            gap: 8px;
        }

        /* 可愛的小修改按鈕 */
        .btn-edit {
            background-color: var(--main-blue);
            color: #4a7c8c;
            border: none;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            height: auto;
            width: auto;
            margin: 0;
            box-shadow: 0 2px 0px #b3dae5;
        }
        .btn-edit:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0px #b3dae5;
        }

        .btn-clear {
            background: none;
            border: 1px solid #e0d0c1;
            color: #bbb;
            font-size: 11px;
            height: auto;
            padding: 5px 10px;
            border-radius: 10px;
            box-shadow: none;
            width: auto;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧸 餘額計算 🧸</h2>
    
    <div class="input-group">
        <label>✿ 初始總額</label>
        <input type="number" id="totalAmount" placeholder="請輸入金額..." oninput="saveData()">
    </div>

    <div class="input-group">
        <label>✿ 扣款日期</label>
        <input type="date" id="expDate">
    </div>

    <div class="input-group">
        <label>✿ 扣款金額</label>
        <input type="number" id="expAmount" placeholder="今天花多少？">
    </div>

    <button id="submitBtn" onclick="calculate()">確認新增 ✨</button>

    <div class="divider-dashed"></div>

    <div class="balance-result">
        <div class="balance-label">剩餘</div>
        <div id="remainingBalance">$ 0</div>
    </div>

    <div class="history-section">
        <h3>歷史小筆記</h3>
        <div id="historyList"></div>
    </div>

    <center><button class="btn-clear" onclick="clearAll()">清除所有資料</button></center>
</div>

<script>
    let records = [];
    let editIndex = -1; // 追蹤目前正在修改哪一筆紀錄，-1 代表處於常規的新增狀態

    window.onload = function() {
        const savedRecords = localStorage.getItem('my_records');
        const savedTotal = localStorage.getItem('my_total');

        if (savedRecords) {
            records = JSON.parse(savedRecords);
            renderHistory();
        }
        if (savedTotal) {
            document.getElementById('totalAmount').value = savedTotal;
        }
        
        updateBalanceDisplay();
        document.getElementById('expDate').valueAsDate = new Date();
    };

    function calculate() {
        const total = parseFloat(document.getElementById('totalAmount').value);
        const amount = parseFloat(document.getElementById('expAmount').value);
        const date = document.getElementById('expDate').value;

        if (isNaN(total)) {
            alert("請先填寫總金額喔！(๑•́ ₃ •̀๑)");
            return;
        }
        if (isNaN(amount) || !date) {
            alert("日期或金額也要填寫唷！");
            return;
        }

        if (editIndex === -1) {
            // 正常狀態：新增紀錄
            records.push({ date, amount });
        } else {
            // 修改狀態：覆蓋舊有紀錄
            records[editIndex] = { date, amount };
            editIndex = -1; // 修改完後重設回新增狀態
            document.getElementById('submitBtn').innerHTML = "確認新增紀錄 ✨";
            document.getElementById('submitBtn').style.backgroundColor = "var(--main-pink)";
            document.getElementById('submitBtn').style.color = "#a65d6a";
            document.getElementById('submitBtn').style.boxShadow = "0 4px 0px #f2b6c1";
        }

        saveData();
        updateBalanceDisplay();
        renderHistory();
        
        // 清空輸入框並回復今日日期
        document.getElementById('expAmount').value = "";
        document.getElementById('expDate').valueAsDate = new Date();
    }

    // 觸發修改模式
    function editRecord(index) {
        editIndex = index;
        const record = records[index];
        
        // 把舊資料填回輸入框
        document.getElementById('expDate').value = record.date;
        document.getElementById('expAmount').value = record.amount;
        
        // 讓上方按鈕變成汽水藍提示正在「修改中」
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerHTML = "儲存修改內容 ✏️";
        submitBtn.style.backgroundColor = "var(--main-blue)";
        submitBtn.style.color = "#4a7c8c";
        submitBtn.style.boxShadow = "0 4px 0px #b3dae5";
        
        // 自動捲動到上方方便填寫
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function saveData() {
        const totalVal = document.getElementById('totalAmount').value;
        localStorage.setItem('my_records', JSON.stringify(records));
        localStorage.setItem('my_total', totalVal);
        updateBalanceDisplay();
    }

    function updateBalanceDisplay() {
        const totalVal = parseFloat(document.getElementById('totalAmount').value) || 0;
        const totalSpent = records.reduce((sum, record) => sum + record.amount, 0);
        const remaining = totalVal - totalSpent;
        document.getElementById('remainingBalance').innerText = `$ ${remaining.toLocaleString()}`;
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = "";
        
        // 這裡我們需要保留原本的 index，所以用原陣列跑 loop
        // 但為了讓最新的在上面，我們用一個反向的迴圈來渲染
        for (let i = records.length - 1; i >= 0; i--) {
            const record = records[i];
            const item = document.createElement('div');
            item.className = 'history-item';
            
            item.innerHTML = `
                <div class="history-info">
                    <span class="history-date">📅 ${record.date}</span>
                    <span class="history-amount">- $${record.amount.toLocaleString()}</span>
                </div>
                <div class="history-actions">
                    <button class="btn-edit" onclick="editRecord(${i})">✏️ 修改</button>
                </div>
            `;
            list.appendChild(item);
        }
    }

    function clearAll() {
        if (confirm("確定要刪除所有紀錄嗎？(｡ŏ﹏ŏ)")) {
            localStorage.clear();
            records = [];
            editIndex = -1;
            document.getElementById('submitBtn').innerHTML = "確認新增紀錄 ✨";
            document.getElementById('totalAmount').value = "";
            document.getElementById('remainingBalance').innerText = "$ 0";
            renderHistory();
        }
    }
</script>

</body>
</html>
